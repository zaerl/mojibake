version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /utils/generate
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    groups:
      npm-generator:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /src/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    groups:
      npm-api:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

