name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

