name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux / GCC
            os: ubuntu-latest
            cc: gcc
            cxx: g++
          - label: Linux / Clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
          - label: Linux ARM64 / GCC
            os: ubuntu-24.04-arm
            cc: gcc
            cxx: g++
          - label: macOS / Clang
            os: macos-latest
            cc: clang
            cxx: clang++
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v7

      - name: Cache Unicode test data
        uses: actions/cache@v6
        with:
          path: utils/generate/unicode-data
          key: test-data-draft-18.0.0

      - name: Download Unicode test data
        run: ./utils/generate/scripts/download-test-data.sh

      - name: Test
        run: |
          cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Test
          cmake --build build-test
          ./build-test/tests/mojibake-test

      - name: Test (no character names)
        run: |
          cmake -S . -B build-test-no-names -DCMAKE_BUILD_TYPE=Test \
            -DMJB_FEATURE_CHARACTER_NAMES=OFF
          cmake --build build-test-no-names
          ./build-test-no-names/tests/mojibake-test

      - name: Test (embedded NULLs)
        run: |
          cmake -S . -B build-test-null -DCMAKE_BUILD_TYPE=Test -DMJB_ALLOW_EMBEDDED_NULLS=ON
          cmake --build build-test-null
          ./build-test-null/tests/mojibake-test

      - name: Test (C++)
        run: |
          cmake -S . -B build-test-cpp -DCMAKE_BUILD_TYPE=Test -DMJB_BUILD_CPP=ON
          cmake --build build-test-cpp
          ./build-test-cpp/tests/mojibake-test

      - name: Test (AddressSanitizer)
        run: |
          cmake -S . -B build-test-asan -DCMAKE_BUILD_TYPE=Test -DMJB_USE_ASAN=ON
          cmake --build build-test-asan
          ./build-test-asan/tests/mojibake-test

      - name: Test (UndefinedBehaviorSanitizer)
        run: |
          cmake -S . -B build-test-ubsan -DCMAKE_BUILD_TYPE=Test -DMJB_USE_UBSAN=ON
          cmake --build build-test-ubsan
          ./build-test-ubsan/tests/mojibake-test

  test-bsd:
    name: Test (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: FreeBSD 15.1
            os: freebsd
            version: '15.1'
          - label: OpenBSD 7.9
            os: openbsd
            version: '7.9'
          - label: NetBSD 10.1
            os: netbsd
            version: '10.1'
          - label: Haiku R1/beta5
            os: haiku
            version: 'r1beta5'
    steps:
      - uses: actions/checkout@v7

      - name: Cache Unicode test data
        uses: actions/cache@v6
        with:
          path: utils/generate/unicode-data
          key: test-data-18.0.0

      - name: Download Unicode test data
        run: ./utils/generate/scripts/download-test-data.sh

      - name: Start ${{ matrix.label }} VM
        uses: cross-platform-actions/action@5ea7e8e4677bd726033a10b094ba1c5762b15dee # v1.3.0
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.version }}
          shell: sh
          sync_files: runner-to-vm

      - name: Install CMake
        shell: cpa.sh {0} --sync-files none
        run: |
          case "$(uname -s)" in
            FreeBSD) (command -v sudo >/dev/null 2>&1 && sudo pkg install -y cmake) || pkg install -y cmake ;;
            OpenBSD) (command -v doas >/dev/null 2>&1 && doas pkg_add cmake) || (command -v sudo >/dev/null 2>&1 && sudo pkg_add cmake) || pkg_add cmake ;;
            NetBSD) (command -v sudo >/dev/null 2>&1 && sudo pkgin -y install cmake) || pkgin -y install cmake ;;
            Haiku) pkgman install -y cmake ;;
          esac

      - name: Test
        shell: cpa.sh {0} --sync-files none
        run: |
          uname -a
          cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Test
          cmake --build build-test
          ./build-test/tests/mojibake-test

      - name: Test (no character names)
        shell: cpa.sh {0} --sync-files none
        run: |
          cmake -S . -B build-test-no-names -DCMAKE_BUILD_TYPE=Test \
            -DMJB_FEATURE_CHARACTER_NAMES=OFF
          cmake --build build-test-no-names
          ./build-test-no-names/tests/mojibake-test

      - name: Test (embedded NULLs)
        shell: cpa.sh {0} --sync-files none
        run: |
          cmake -S . -B build-test-null -DCMAKE_BUILD_TYPE=Test -DMJB_ALLOW_EMBEDDED_NULLS=ON
          cmake --build build-test-null
          ./build-test-null/tests/mojibake-test

      - name: Test (C++)
        shell: cpa.sh {0} --sync-files none
        run: |
          cmake -S . -B build-test-cpp -DCMAKE_BUILD_TYPE=Test -DMJB_BUILD_CPP=ON
          cmake --build build-test-cpp
          ./build-test-cpp/tests/mojibake-test

  test-windows:
    name: Test (Windows / MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache Unicode test data
        uses: actions/cache@v6
        with:
          path: utils/generate/unicode-data
          key: test-data-18.0.0

      - name: Download Unicode test data
        shell: bash
        run: ./utils/generate/scripts/download-test-data.sh

      - name: Test
        shell: bash
        run: |
          cmake -S . -B build-test "-DCMAKE_CONFIGURATION_TYPES=Debug;Release;Test"
          cmake --build build-test --config Test
          ./build-test/tests/Test/mojibake-test.exe

      - name: Test (no character names)
        shell: bash
        run: |
          cmake -S . -B build-test-no-names \
            "-DCMAKE_CONFIGURATION_TYPES=Debug;Release;Test" \
            -DMJB_FEATURE_CHARACTER_NAMES=OFF
          cmake --build build-test-no-names --config Test
          ./build-test-no-names/tests/Test/mojibake-test.exe

      - name: Test (embedded NULLs)
        shell: bash
        run: |
          cmake -S . -B build-test-null \
            "-DCMAKE_CONFIGURATION_TYPES=Debug;Release;Test" \
            -DMJB_ALLOW_EMBEDDED_NULLS=ON
          cmake --build build-test-null --config Test
          ./build-test-null/tests/Test/mojibake-test.exe

      - name: Test (C++)
        shell: bash
        run: |
          cmake -S . -B build-test-cpp \
            "-DCMAKE_CONFIGURATION_TYPES=Debug;Release;Test" \
            -DMJB_BUILD_CPP=ON
          cmake --build build-test-cpp --config Test
          ./build-test-cpp/tests/Test/mojibake-test.exe

  strict-c11:
    name: Strict C11 (source and amalgamation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install amalgamation generator dependencies
        working-directory: utils/generate
        run: npm ci

      - name: Compile source with -std=c11 -Werror
        run: |
          mkdir -p build-strict/source
          for source in src/*.c; do
            object="build-strict/source/$(basename "${source%.c}").o"
            cc -std=c11 -Werror -Wall -Wextra -pedantic \
              -Wno-unused-parameter -Wtype-limits -Isrc -c "$source" -o "$object"
          done
          ar rcs build-strict/libmojibake.a build-strict/source/*.o

      - name: Generate amalgamation
        working-directory: utils/generate
        run: |
          mkdir -p ../../build-amalgamation
          npm run generate -- amalgamation

      - name: Compile and run amalgamation with -std=c11 -Werror
        run: |
          cc -std=c11 -Werror -Wall -Wextra -pedantic \
            -Wno-unused-parameter -Wtype-limits -Ibuild-amalgamation \
            examples/example.c build-amalgamation/mojibake.c \
            -o build-strict/amalgamation-example
          ./build-strict/amalgamation-example

  minimum-compilers:
    name: Minimum compiler (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: GCC 9
            packages: gcc-9 g++-9
            cc: gcc-9
            cxx: g++-9
            major: '9'
          - label: Clang 10
            packages: clang-10
            cc: clang-10
            cxx: clang++-10
            major: '10'
    steps:
      - uses: actions/checkout@v7

      - name: Build and smoke-test C11 and C++17 modes
        run: |
          docker run --rm -v "$PWD:/src:ro" ubuntu:20.04 sh -ec '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y cmake make ${{ matrix.packages }}

            version="$(${{ matrix.cc }} -dumpversion)"
            case "$version" in
              ${{ matrix.major }}.*) ;;
              *) echo "Expected compiler major ${{ matrix.major }}, got $version"; exit 1 ;;
            esac

            cmake -S /src -B /tmp/build-c -DCMAKE_BUILD_TYPE=Test \
              -DCMAKE_C_COMPILER=${{ matrix.cc }}
            cmake --build /tmp/build-c --parallel 2
            cd /tmp/build-c
            ctest --output-on-failure -R "^Version$"

            cmake -S /src -B /tmp/build-cpp -DCMAKE_BUILD_TYPE=Test \
              -DCMAKE_C_COMPILER=${{ matrix.cc }} \
              -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DMJB_BUILD_CPP=ON
            cmake --build /tmp/build-cpp --parallel 2
            cd /tmp/build-cpp
            ctest --output-on-failure -R "^(C\\+\\+ Mojibake|Version)$"
          '

  mingw:
    name: MinGW-w64 (UCRT64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja

      - name: Build and smoke-test
        run: |
          gcc --version
          cmake -S . -B build-mingw -G Ninja -DCMAKE_BUILD_TYPE=Test
          cmake --build build-mingw
          cd build-mingw
          ctest --output-on-failure -R '^(Encoding|Version)$'

  portable-linux:
    name: Platform (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Alpine / musl x86_64
            platform: linux/amd64
            machine: x86_64
            qemu: false
          - label: Alpine / musl i386
            platform: linux/386
            machine: i686
            qemu: true
          - label: Alpine / musl s390x (big-endian)
            platform: linux/s390x
            machine: s390x
            qemu: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: 386,s390x

      - name: Build and smoke-test
        run: |
          docker run --rm --platform '${{ matrix.platform }}' \
            -v "$PWD:/src:ro" alpine:3.23 sh -ec '
              apk add --no-cache build-base cmake
              test "$(uname -m)" = "${{ matrix.machine }}"
              cmake -S /src -B /tmp/build -DCMAKE_BUILD_TYPE=Test
              cmake --build /tmp/build --parallel 2
              cd /tmp/build
              ctest --output-on-failure -R "^(Encoding|Version)$"
            '

  cross-android:
    name: Cross-compile (Android NDK / ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure and build
        run: |
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version
          cmake -S . -B build-android -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 \
            -DMJB_BUILD_TESTS=OFF -DMJB_BUILD_CLI=OFF -DMJB_INSTALL=OFF
          cmake --build build-android --parallel 2
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf" \
            -h build-android/src/CMakeFiles/mojibake_lib.dir/mojibake.c.o | \
            grep -E 'Machine:.*AArch64'

  cross-ios:
    name: Cross-compile (iOS / ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure and build
        run: |
          xcodebuild -version
          cmake -S . -B build-ios -G Xcode -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DMJB_BUILD_TESTS=OFF -DMJB_BUILD_CLI=OFF -DMJB_INSTALL=OFF
          cmake --build build-ios --config Release --parallel 2 -- \
            -sdk iphoneos CODE_SIGNING_ALLOWED=NO
          find build-ios -name libmojibake.a -exec lipo -info {} \; | grep arm64

  wasm:
    name: WASM (Node and browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/api/package-lock.json

      - uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.1
          actions-cache-folder: emsdk-cache

      - name: Install API dependencies
        working-directory: src/api
        run: npm ci

      - name: Build WASM
        run: make sync-api-wasm

      - name: Test Node and browser runtimes
        working-directory: src/api
        env:
          MJB_BROWSER: google-chrome
        run: npm test

  fuzz:
    name: Fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The runner ships a libFuzzer-capable clang, so build directly instead of via Docker.
      - name: Fuzz
        run: |
          clang -g -O1 -std=c17 -fsanitize=fuzzer,address,undefined \
            -fno-sanitize-recover=undefined -Isrc \
            -o mojibake-fuzz fuzz/fuzz.c src/*.c
          ./mojibake-fuzz -max_total_time=60 fuzz/corpus
