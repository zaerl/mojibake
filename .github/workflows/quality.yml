name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install clang-format
        run: |
          pipx install clang-format==21.1.8
          pipx_bin_dir=$(pipx environment --value PIPX_BIN_DIR)
          echo "$pipx_bin_dir" >> "$GITHUB_PATH"
          "$pipx_bin_dir/clang-format" --version

      - name: Check clang-format
        run: |
          git ls-files -z '*.c' '*.h' '*.cpp' '*.hpp' |
            xargs -0 clang-format --dry-run --Werror

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install generator dependencies
        working-directory: utils/generate
        run: npm ci

      - name: Typecheck generator
        working-directory: utils/generate
        run: npm exec -- tsc --noEmit

      - name: Install API dependencies
        working-directory: src/api
        run: npm ci

      - name: Typecheck API
        working-directory: src/api
        run: npm run typecheck

  generated:
    name: Generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache Unicode generator data
        uses: actions/cache@v6
        with:
          path: utils/generate/unicode-data
          key: generator-data-18.0.0-v1

      - name: Install generator dependencies
        working-directory: utils/generate
        run: npm ci

      - name: Regenerate files
        run: make generate

      - name: Check generated files are current
        run: |
          git status --short
          git diff --exit-code
